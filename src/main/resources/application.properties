# ????? (????????????)
spring.datasource.url=jdbc:postgresql://localhost:5432/campus_seckill
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ??
spring.jpa.hibernate.ddl-auto=update
# 需要看 SQL 时再改为 true；false 可减少控制台 Hibernate: 刷屏（分页每次会打 count + select 两条）
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis ?? (???? 6379????????)
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password=
# 仅使用 RedisTemplate 做缓存即可；关闭后不再把 JPA Repository 误当成 Redis Repository 扫描（消除启动时一堆 INFO）
spring.data.redis.repositories.enabled=false
server.port=8080

